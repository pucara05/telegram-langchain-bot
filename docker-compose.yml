services:
  redis:
    image: redis:alpine
    container_name: redis-bot
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  chroma:
    image: chromadb/chroma
    container_name: chroma-db
    ports:
      - '8000:8000'
    volumes:
      - chroma-data:/chroma/.chroma/index
    restart: unless-stopped

volumes:
  redis-data:
  chroma-data: